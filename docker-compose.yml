services:
  whois-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whois-lookup-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      # Persist API keys and settings across restarts
      - ./data:/app/data:rw
    networks:
      - whois-network

networks:
  whois-network:
    driver: bridge
